<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Loamwake is a fixed-room ecological puzzle platformer playable in the browser.">
    <title>Loamwake</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell" aria-label="Loamwake browser game">
      <canvas id="game" width="1280" height="720" aria-label="Loamwake game canvas"></canvas>
      <div class="touch-controls" aria-label="Touch controls">
        <button type="button" data-hold="left">Left</button>
        <button type="button" data-hold="down">Down</button>
        <button type="button" data-hold="right">Right</button>
        <button type="button" data-tap="space">Action</button>
        <button type="button" data-tap="reset">Reset</button>
      </div>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
